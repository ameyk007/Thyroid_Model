<!DOCTYPE html>
<html>
<head>
  <title>Thyroid AI Predictor</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: #0a0f2c;
      font-family: Arial;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 25px;
      border-radius: 10px;
      width: 350px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
    }

    .form-group {
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #00bcd4;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    .result-box {
      margin-top: 15px;
      text-align: center;
    }

    img {
      margin-top: 15px;
      width: 100%;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Thyroid Recurrence Predictor</h1>

  <div class="form-group">
    <label>Age</label>
    <input id="age" type="number" placeholder="Enter age">
  </div>

  <div class="form-group">
    <label>Gender</label>
    <select id="gender">
      <option>Male</option>
      <option>Female</option>
    </select>
  </div>

  <div class="form-group">
    <label>Smoking</label>
    <select id="smoking">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>

  <div class="form-group">
    <label>Adenopathy</label>
    <select id="adenopathy">
      <option>No</option>
      <option>Yes</option>
    </select>
  </div>

  <div class="form-group">
    <label>Focality</label>
    <select id="focality">
      <option>Uni-Focal</option>
    </select>
  </div>

  <div class="form-group">
    <label>Stage</label>
    <select id="stage">
      <option>II</option>
      <option>III</option>
      <option>IVA</option>
      <option>IVB</option>
    </select>
  </div>

  <button onclick="predict()">Predict Risk</button>

  <div class="result-box">
    <h2 id="result"></h2>
  </div>

  <img id="graph"/>
</div>

<script>
function predict() {
    const data = {
        age: parseInt(document.getElementById("age").value),
        gender: document.getElementById("gender").value,
        smoking: document.getElementById("smoking").value,
        adenopathy: document.getElementById("adenopathy").value,
        focality: document.getElementById("focality").value,
        stage: document.getElementById("stage").value
    };

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(data => {
        console.log(data); // 🔍 debug

        document.getElementById("result").innerText =
            data.prediction + " | Risk: " + (data.probability * 100).toFixed(2) + "%";

        const graph = document.getElementById("graph");

        if (data.graph && data.graph.length > 0) {
            graph.src = "data:image/png;base64," + data.graph;
            graph.style.display = "block";
        } else {
            graph.style.display = "none";
            console.log("Graph not received");
        }
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
